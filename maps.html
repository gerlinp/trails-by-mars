        <div class="map-shell">
            <div id="map"></div>
            <p class="map-osm-credit">
                Map © <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener noreferrer">OpenStreetMap</a>
            </p>
            <aside class="map-place-card" id="map-place-card" aria-hidden="true">
                <div class="map-place-card__inner">
                    <!-- Compact strip — phones / small screens -->
                    <div class="map-place-card__mobile">
                        <figure class="map-place-card__thumb">
                            <img
                                class="map-place-card__img"
                                src="images/folio/gallery/pf-01.jpg"
                                width="128"
                                height="128"
                                alt=""
                                decoding="async"
                            >
                        </figure>
                        <div class="map-place-card__content">
                            <div class="map-place-card__head">
                                <div class="map-place-card__copy">
                                    <div id="map-place-heading-anchor-mobile" class="map-place-card__heading-anchor"></div>
                                    <p class="text-body-sm map-place-card__detail map-place-card__detail--mobile">1.9 mi · Est. 40 min · Loop</p>
                                </div>
                                <div class="map-place-card__head-actions">
                                    <button type="button" class="map-place-card__close js-map-place-close" aria-label="Close trail details">×</button>
                                    <a class="map-place-card__directions js-map-directions" href="#" target="_blank" rel="noopener noreferrer">Directions</a>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Side panel — tablet & desktop (AllTrails-style) -->
                    <div class="map-place-card__tablet">
                        <header class="map-place-card__toolbar">
                            <a class="map-place-card__toolbar-link" href="index.html" aria-label="Back to home">← Back</a>
                            <span class="map-place-card__toolbar-fill" aria-hidden="true"></span>
                            <button type="button" class="map-place-card__close map-place-card__close--toolbar js-map-place-close" aria-label="Close trail details">×</button>
                        </header>
                        <div class="map-place-card__tablet-scroll">
                            <div id="map-place-heading-anchor-tablet" class="map-place-card__heading-anchor">
                                <div id="map-place-trail-heading" class="map-place-card__trail-heading">
                                    <h2 class="map-place-card__title">Pond Meadow Paved Trail</h2>
                                    <p class="text-pretitle map-place-card__subtitle map-place-card__kicker">Pond Meadow Park</p>
                                    <p class="map-place-card__postal text-body-sm"></p>
                                </div>
                            </div>

                            <div class="map-place-card__actions" role="toolbar" aria-label="Trail actions">
                                <a class="btn btn--primary btn--small js-map-directions" href="#" target="_blank" rel="noopener noreferrer">Directions</a>
                                <button type="button" class="btn btn--stroke btn--small" id="map-place-share">Share</button>
                            </div>

                            <div class="map-place-card__gallery">
                                <img class="map-place-card__gallery-main" src="" alt="" width="320" height="200" decoding="async">
                                <div class="map-place-card__gallery-stack">
                                    <img class="map-place-card__gallery-sub" src="" alt="" width="160" height="96" decoding="async">
                                    <img class="map-place-card__gallery-sub" src="" alt="" width="160" height="96" decoding="async">
                                </div>
                            </div>

                            <dl class="map-place-card__metrics">
                                <div class="map-place-card__metric">
                                    <dt class="map-place-card__metric-label">Length</dt>
                                    <dd class="map-place-card__metric-value" data-map-metric="length">—</dd>
                                </div>
                                <div class="map-place-card__metric">
                                    <dt class="map-place-card__metric-label">Est. time</dt>
                                    <dd class="map-place-card__metric-value" data-map-metric="estimatedTime">—</dd>
                                </div>
                                <div class="map-place-card__metric">
                                    <dt class="map-place-card__metric-label">Route type</dt>
                                    <dd class="map-place-card__metric-value" data-map-metric="routeType">—</dd>
                                </div>
                            </dl>

                            <p class="map-place-card__description"></p>

                            <a class="btn btn--primary map-place-card__more" href="index.html#guide">Show more details</a>
                        </div>
